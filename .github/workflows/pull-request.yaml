---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# yamllint disable rule:truthy
name: Pull Request

on:
  merge_group:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: DeterminateSystems/nix-installer-action@v22
      - name: Prepare schemas
        run: |
          nix develop -c just prepare
          mkdir -p out/site
          chmod 777 out/site
      - name: Verify flatten output
        run: |
          test -d out/_clean || { echo "::error::out/_clean missing"; exit 1; }
          n=$(find out/_clean -name '*.yaml' | wc -l)
          echo "flattened $n CRD(s)"
          test "$n" -gt 0 || { echo "::error::no CRDs flattened"; exit 1; }
      - name: Render schemas + HTML site
        uses: docker://ghcr.io/sholdee/crd-schema-publisher:v2026.609.12656@sha256:f1be1370500884688250005661dfc15da2e0663e64bc1804ef9027548cf1c168
        env:
          BASE_PATH: "/k8s-schemas"
        with:
          args: convert -d /github/workspace/out/_clean -o /github/workspace/out/site --render
      - name: Verify rendered site
        run: |
          test -f out/site/index.html || { echo "::error::index.html missing"; exit 1; }
          n=$(find out/site -name '*.json' -not -path '*/master-standalone/*' | wc -l)
          echo "rendered $n schema(s)"
          test "$n" -gt 0 || { echo "::error::no schemas rendered"; exit 1; }

  status:
    if: ${{ !cancelled() }}
    needs: build
    name: Status
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Check upstream results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            exit 1
          fi
          echo "ok"
