---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# yamllint disable rule:truthy
name: Pull Request

on:
  merge_group:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f # main
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # main

      - name: Prepare schemas
        run: |
          nix develop -c just prepare
          mkdir -p out/site
          chmod 777 out/site

      - name: Verify flatten output
        run: |
          test -d out/_clean || { echo "::error::out/_clean missing"; exit 1; }
          n=$(find out/_clean -name '*.yaml' | wc -l)
          echo "flattened $n CRD(s)"
          test "$n" -gt 0 || { echo "::error::no CRDs flattened"; exit 1; }

      - name: Render schemas + HTML site
        uses: docker://ghcr.io/sholdee/crd-schema-publisher:v2026.519.317@sha256:9e1bb54c09f3d72614f2911eb00981f344dfcb9ad34b44bf396a200a69868806
        env:
          BASE_PATH: "/k8s-schemas"
        with:
          args: convert -d /github/workspace/out/_clean -o /github/workspace/out/site --render

      - name: Verify rendered site
        run: |
          test -f out/site/index.html || { echo "::error::index.html missing"; exit 1; }
          n=$(find out/site -name '*.json' -not -path '*/master-standalone/*' | wc -l)
          echo "rendered $n schema(s)"
          test "$n" -gt 0 || { echo "::error::no schemas rendered"; exit 1; }

  status:
    if: ${{ !cancelled() }}
    needs: build
    name: Status
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Check upstream results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            exit 1
          fi
          echo "ok"
